# SistemaDeTickets — nginx hardened config
# Sits behind Traefik / Cloudflare. Real client IP comes via CF-Connecting-IP.

# ── Real client IP from Cloudflare edge ─────────────────────────────────────
# IPv4 ranges (cloudflare.com/ips-v4)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# IPv6 ranges
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
# Also accept Traefik on the docker network as a trusted proxy
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 10.0.0.0/8;
real_ip_header CF-Connecting-IP;
real_ip_recursive on;

server {
    listen 80;
    server_name _;
    root /var/www/html;
    index Loginti.php index.php;

    # ── Server fingerprint / disclosure ─────────────────────────────────────
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # HSTS — staged rollout. Start small and bump after validation:
    #   max-age=300       (week 1, easy rollback)
    #   max-age=86400     (week 2)
    #   max-age=63072000; includeSubDomains (after 4-6 weeks of clean traffic)
    add_header Strict-Transport-Security "max-age=300" always;
    # Content Security Policy — allowlist for third-party CDNs the codebase uses.
    # 'unsafe-inline' is required because of large amount of legacy inline JS/CSS;
    # remove it once all inline handlers are extracted into nonced/external scripts.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com https://cdn.datatables.net https://maxcdn.bootstrapcdn.com https://nightly.datatables.net; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://code.jquery.com https://cdn.datatables.net https://nightly.datatables.net https://unpkg.com https://static.cloudflareinsights.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # ── Body / timeout limits ───────────────────────────────────────────────
    client_max_body_size 10M;
    client_body_timeout  15s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 30s;

    # ── Hard 410 on legacy/dangerous endpoints (belt-and-braces in case any
    #    deletion is reverted or a file is reintroduced) ────────────────────
    location ~* ^/(abc|upload|Login_Procesar|new\ 4|t1|PruebaTabla|PruebaAsignar1|demopruebatab|FORMSGRES|MenuTablero2|MT2|LoginMant|LoginTicket)\.(php|html?)$ {
        return 410;
    }

    # ── Block direct access to PHP includes (must only be used via require_once) ──
    location ~* ^/(config|auth_check|auth_check_api|api_client|roles)\.php$ {
        deny all;
        return 404;
    }

    # ── Block ANY php/script execution inside /uploads/ ─────────────────────
    location ~* ^/uploads/.*\.(php|phtml|phps|cgi|pl|py|sh|asp|aspx|jsp)$ {
        deny all;
        return 403;
    }
    location /uploads/ {
        autoindex off;
    }

    # ── Block dotfiles, infra files, backups, sensitive extensions ──────────
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }
    location ~* \.(env|env\..*|log|sql|sqlite|bak|orig|swp|swo|ini|md|yml|yaml|toml|lock|dist|example|conf)$ {
        deny all;
        return 404;
    }
    location = /Dockerfile        { deny all; return 404; }
    location = /docker-compose.yml      { deny all; return 404; }
    location = /docker-compose.test.yml { deny all; return 404; }
    location = /composer.json     { deny all; return 404; }
    location = /composer.lock     { deny all; return 404; }
    location = /package.json      { deny all; return 404; }
    location ~* ^/(logs?|nginx|php|tmp|temp)/ { deny all; return 404; }
    # Block direct access to library directories — they must only be loaded via require/include
    location ~* ^/(PHPMailer|vendor|node_modules)/ { deny all; return 404; }

    # ── Static assets (cached) ──────────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|pdf|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # ── Default routing ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /Loginti.php?$query_string;
    }

    # ── PHP execution: ONLY for files that physically exist on disk ─────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_hide_header X-Powered-By;
    }
}
