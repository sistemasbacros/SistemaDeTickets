; PHP runtime hardening for SistemaDeTickets
; Loaded by Docker entrypoint as /usr/local/etc/php/conf.d/custom.ini

; ── Limits ───────────────────────────────────────────────────────────────────
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
upload_max_filesize = 10M
post_max_size = 12M
date.timezone = America/Mexico_City

; ── Errors / disclosure ──────────────────────────────────────────────────────
expose_php = Off
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php-error.log

; ── Opcache ──────────────────────────────────────────────────────────────────
opcache.enable = 1
opcache.validate_timestamps = 1

; ── Session hardening ────────────────────────────────────────────────────────
; Defaults; individual scripts can still tighten further but never relax these.
session.cookie_httponly  = 1
session.cookie_secure    = 1
session.cookie_samesite  = "Strict"
session.use_strict_mode  = 1
session.use_only_cookies = 1
session.use_trans_sid    = 0
session.gc_maxlifetime   = 1800

; ── Misc safety ──────────────────────────────────────────────────────────────
allow_url_fopen = On
allow_url_include = Off
