name: Deploy to Production Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_PATH: C:\deploy\SistemaDeTicketsProduccion
  COMPOSE_FILE: docker-compose.yml

jobs:
  deploy:
    name: Deploy PRODUCTION (main branch)
    runs-on: [self-hosted, Windows, X64, production, tickets]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Create deploy directory
        shell: powershell
        run: |
          if (-not (Test-Path "$env:DEPLOY_PATH")) {
            New-Item -Path "$env:DEPLOY_PATH" -ItemType Directory -Force | Out-Null
            Write-Host "OK: Directorio creado: $env:DEPLOY_PATH"
          } else {
            Write-Host "OK: Directorio ya existe: $env:DEPLOY_PATH"
          }

      - name: Generate .env from GitHub Secrets
        shell: powershell
        env:
          DB_HOST:            ${{ secrets.PROD_DB_HOST }}
          DB_PORT:            ${{ secrets.PROD_DB_PORT }}
          DB_DATABASE:        ${{ secrets.PROD_DB_DATABASE }}
          DB_DATABASE_COMEDOR: ${{ secrets.PROD_DB_DATABASE_COMEDOR }}
          DB_USERNAME:        ${{ secrets.PROD_DB_USERNAME }}
          DB_PASSWORD:        ${{ secrets.PROD_DB_PASSWORD }}
          HTTP_PORT:          ${{ secrets.PROD_HTTP_PORT }}
          SMTP_HOST:          ${{ secrets.SMTP_HOST }}
          SMTP_PORT:          ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME:      ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD:      ${{ secrets.SMTP_PASSWORD }}
          ADMIN_EMAIL:        ${{ secrets.ADMIN_EMAIL }}
          ADMIN_NAME:         ${{ secrets.ADMIN_NAME }}
        run: |
          $envContent = @"
# Generado automaticamente por CI/CD - NO editar manualmente
# Ambiente: PRODUCCION | Rama: main | Fecha: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')

APP_ENV=production
HTTP_PORT=$env:HTTP_PORT

DB_HOST=$env:DB_HOST
DB_PORT=$env:DB_PORT
DB_DATABASE=$env:DB_DATABASE
DB_DATABASE_COMEDOR=$env:DB_DATABASE_COMEDOR
DB_USERNAME=$env:DB_USERNAME
DB_PASSWORD=$env:DB_PASSWORD

SMTP_HOST=$env:SMTP_HOST
SMTP_PORT=$env:SMTP_PORT
SMTP_USERNAME=$env:SMTP_USERNAME
SMTP_PASSWORD=$env:SMTP_PASSWORD

ADMIN_EMAIL=$env:ADMIN_EMAIL
ADMIN_NAME=$env:ADMIN_NAME

TZ=America/Mexico_City
"@
          $envPath = Join-Path $env:DEPLOY_PATH ".env"
          $envContent | Out-File -FilePath $envPath -Encoding utf8 -Force
          Write-Host "OK: .env generado en $envPath"

      - name: Deploy files
        shell: powershell
        run: |
          if (-not (Test-Path "Dockerfile")) {
            Write-Host "ERROR: Dockerfile no encontrado. Verifica el checkout."
            exit 1
          }

          $excludePatterns = @('.env', 'nginx\logs', '.git')
          $fileCount = 0

          Get-ChildItem -Path "." -Recurse -File | ForEach-Object {
            $relativePath = $_.FullName.Substring((Get-Location).Path.Length + 1)
            $shouldExclude = $false
            foreach ($pattern in $excludePatterns) {
              if ($relativePath -like "*$pattern*") {
                $shouldExclude = $true
                break
              }
            }
            if (-not $shouldExclude) {
              $destPath = Join-Path $env:DEPLOY_PATH $relativePath
              $destDir = Split-Path $destPath -Parent
              if (-not (Test-Path $destDir)) {
                New-Item -Path $destDir -ItemType Directory -Force | Out-Null
              }
              Copy-Item -Path $_.FullName -Destination $destPath -Force
              $fileCount++
            }
          }
          Write-Host "OK: $fileCount archivos desplegados"

          # Verificar archivos criticos
          @('Dockerfile', 'docker-compose.yml') | ForEach-Object {
            $filePath = Join-Path $env:DEPLOY_PATH $_
            if (-not (Test-Path $filePath)) {
              Write-Host "ERROR: Archivo critico no encontrado: $_"
              exit 1
            }
            Write-Host "OK: Verificado $_"
          }

      - name: Verify Docker
        shell: powershell
        run: |
          if (-not (Get-Command docker -ErrorAction SilentlyContinue)) {
            Write-Host "ERROR: Docker no está en el PATH"
            exit 1
          }
          docker compose version | Out-Null
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Docker Compose no disponible"; exit 1 }
          docker ps | Out-Null
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Docker daemon no responde"; exit 1 }
          Write-Host "OK: Docker listo"

      - name: Stop existing containers
        shell: powershell
        continue-on-error: true
        run: |
          Set-Location $env:DEPLOY_PATH
          if (Test-Path $env:COMPOSE_FILE) {
            docker compose -f $env:COMPOSE_FILE down
            Write-Host "OK: Contenedores detenidos"
          }

      - name: Build and start containers
        shell: powershell
        run: |
          Set-Location $env:DEPLOY_PATH
          docker compose -f $env:COMPOSE_FILE build
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Build fallido"; exit 1 }
          docker compose -f $env:COMPOSE_FILE up -d
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Error al iniciar contenedores"; exit 1 }
          Write-Host "OK: Contenedores iniciados"

      - name: Verify containers
        shell: powershell
        run: |
          Set-Location $env:DEPLOY_PATH
          Start-Sleep -Seconds 10
          $containers = docker compose -f $env:COMPOSE_FILE ps --format json | ConvertFrom-Json
          $allRunning = $true
          foreach ($c in $containers) {
            if ($c.State -ne "running") {
              Write-Host "ERROR: $($c.Service) no esta corriendo (estado: $($c.State))"
              $allRunning = $false
            } else {
              Write-Host "OK: $($c.Service) corriendo"
            }
          }
          if (-not $allRunning) {
            docker compose -f $env:COMPOSE_FILE logs
            exit 1
          }

      - name: Clean old images
        shell: powershell
        continue-on-error: true
        run: docker image prune -f

      - name: Deployment summary
        shell: powershell
        run: |
          $port = (Get-Content "$env:DEPLOY_PATH\.env" | Select-String "^HTTP_PORT=(\d+)").Matches[0].Groups[1].Value
          Write-Host ""
          Write-Host "============================================================="
          Write-Host "  DESPLIEGUE PRODUCCION COMPLETADO"
          Write-Host "============================================================="
          Write-Host "  URL:    http://localhost:$port"
          Write-Host "  Commit: $env:GITHUB_SHA"
          Write-Host "  Autor:  $env:GITHUB_ACTOR"
          Write-Host "  Fecha:  $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
          Write-Host "============================================================="
          docker compose -f $env:COMPOSE_FILE ps

      - name: Notify on failure
        if: failure()
        shell: powershell
        run: |
          Write-Host "============================================================="
          Write-Host "  DESPLIEGUE PRODUCCION FALLO - Commit: $env:GITHUB_SHA"
          Write-Host "============================================================="
          Write-Host "  Revisa los logs en GitHub Actions"
          Write-Host "  Logs de contenedores:"
          Write-Host "    cd $env:DEPLOY_PATH"
          Write-Host "    docker compose -f $env:COMPOSE_FILE logs"
